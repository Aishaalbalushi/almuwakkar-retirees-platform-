<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouf Almutawea | Al Muwakkar Team</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{
--bg:#ffffff;
--text:#211818;
--card:#ffffff;
--accent:#AF2323;
--para:#666;

background:var(--bg);
color:var(--text);
transition:.4s;
min-height:100vh;
overflow:auto;
}


/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:78px;
    padding:0 45px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#fff;
    backdrop-filter:blur(10px);
    z-index:999;
    border-bottom:1px solid #f0e4e4;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
    transition:.35s;
}

.logo{
    display:flex;
    align-items:center;
    text-decoration:none;
}

.logo img{
    height:56px;
    width:auto;
    display:block;
}

/* NAV */
nav{
    display:flex;
    align-items:center;
    gap:28px;
}

nav a{
    text-decoration:none;
    color:#333;
    font-size:16px;
    font-weight:500;
    position:relative;
    transition:.3s;
}

/* HOVER RED + UNDERLINE */
nav a:hover{
    color:#AF2323;
}

nav a::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-6px;
    width:0;
    height:2px;
    background:#AF2323;
    transition:.3s;
}

nav a:hover::after{
    width:100%;
}

/* NAV BUTTON */
.nav-btn{
    text-decoration:none;
    background:#AF2323;
    color:#fff;
    padding:12px 24px;
    border-radius:30px;
    font-weight:600;
    transition:.3s;
}

.nav-btn:hover{
    background:#7f1717;
}

.hero{
height:calc(100vh - 90px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8%;
}

.left{
max-width:600px;
}

.left h3{
font-size:42px;
margin-bottom:10px;
}

.left h1{
font-size:clamp(52px, 5.8vw, 78px);
line-height:1.05;
margin-bottom:15px;
}

.left h2{
font-size:45px;
margin-bottom:25px;
height:60px;
}

.left h2 span{
color:var(--accent);
border-right:3px solid var(--accent);
padding-right:8px;
animation:blink .7s infinite;
}

.left p{
font-size:18px;
line-height:1.8;
color:var(--para);
margin-bottom:30px;
max-width:520px;
}

.social{
display:flex;
gap:14px;
margin-bottom:30px;
}

.social a{
width:48px;
height:48px;
border-radius:50%;
border:2px solid var(--accent);
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:var(--text);
font-weight:600;
transition:.3s;
}

.social a:hover{
background:var(--accent);
color:white;
transform:translateY(-5px);
}

.btn{
display:inline-block;
padding:14px 35px;
border:2px solid var(--accent);
border-radius:40px;
text-decoration:none;
color:var(--text);
font-weight:600;
transition:.3s;
}

.btn:hover{
background:var(--accent);
color:white;
}

.circle{
width:460px;
height:460px;
border-radius:50%;
overflow:hidden;
border:4px solid var(--accent);
box-shadow:0 0 20px var(--accent),
0 0 60px rgba(175,35,35,.5);
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes blink{
50%{border-color:transparent;}
}

@media(max-width:1100px){

body{
overflow:auto;
}

.hero{
flex-direction:column-reverse;
text-align:center;
height:auto;
padding:40px 8%;
gap:40px;
}

.left h1{
font-size:clamp(42px, 11vw, 60px);
}

.left h2{
font-size:34px;
}

.left h3{
font-size:20px;
}

.left p{
margin:auto;
margin-bottom:30px;
}

.social{
justify-content:center;
}

.circle{
width:320px;
height:320px;
}

nav a, .nav-btn{
display:none;
}
}

</style>
</head>

<body>

<header>
        <a href="index.html" class="logo">
            <img src="image/logo.png" alt="Al Muwakkar logo">
        </a>
    
        <nav>
            <a href="index.html">Home</a>
            <a href="index.html#about">About</a>
            <a href="index.html#services">Services</a>
            <a href="index.html#team">Team</a>
            <a href="index.html#contact">Contact</a>
        </nav>

        <a href="index.html" class="nav-btn">Back Home</a>
</header>

<section class="hero">

<div class="left">
<br><br>
<h3>Hello, I'm</h3>

<h1>Nouf Almutawea</h1>

<h2>And I'm a <span id="typing"></span></h2>
<br><br>
<p>
I'm a Back-End Developer who builds the server-side logic and data flow that
support reliable, organized, and practical website experiences.
</p>

<div class="social">
<a a href="https://www.linkedin.com/in/nouf-almutawea/" target="_blank" >in</a>
<a href="tel:+97336344012">#</a>
<a href="mailto:almutawea.nouf@gmail.com">@</a>
</div>

<a href="CV/nouf-cv.pdf" class="btn">Download CV</a>

</div>

<div class="right">

<div class="circle">
<img src="image/nouf.png">
</div>

</div>

</section>

<script>

const words = ["Back-End Developer"];
let i = 0;
let j = 0;
let current = "";
let isDeleting = false;

function type(){

current = words[i];

if(isDeleting){
j--;
}else{
j++;
}

document.getElementById("typing").textContent = current.substring(0,j);

if(!isDeleting && j == current.length){
isDeleting = true;
setTimeout(type,1000);
return;
}

if(isDeleting && j == 0){
isDeleting = false;
i++;
if(i == words.length){
i = 0;
}
}

setTimeout(type,isDeleting ? 60 : 120);
}

type();

</script>


</body>
</html>
